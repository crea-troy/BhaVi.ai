<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BhaVi.ai — Neural Field Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ─────────────────────────────────────── */
    :root {
      --bg:        #080b10;
      --surface:   #0e1420;
      --border:    #1c2535;
      --accent:    #00e5ff;
      --accent2:   #7b61ff;
      --accent3:   #ff6b6b;
      --text:      #e8edf5;
      --muted:     #5a6a82;
      --glow:      rgba(0,229,255,0.15);
      --glow2:     rgba(123,97,255,0.12);
      --radius:    14px;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    /* ── Reset & Base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── Animated background grid ──────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ────────────────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── Header ────────────────────────────────────────── */
    header {
      padding: 24px 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px var(--glow);
    }

    .logo-text {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--accent);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(0,229,255,0.06);
      border: 1px solid rgba(0,229,255,0.15);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3dff8f;
      box-shadow: 0 0 8px #3dff8f;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Messages area ─────────────────────────────────── */
    .messages {
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Welcome screen ────────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 28px;
      padding: 40px 0;
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .welcome-orb {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        rgba(0,229,255,0.4), rgba(123,97,255,0.3), transparent 70%);
      border: 1px solid rgba(0,229,255,0.2);
      box-shadow: 0 0 60px var(--glow), 0 0 120px var(--glow2);
      animation: orbFloat 4s ease-in-out infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome h2 {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .welcome h2 em {
      font-style: normal;
      color: var(--accent);
    }

    .welcome p {
      color: var(--muted);
      max-width: 380px;
      font-size: 13px;
    }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 500px;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 7px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
      font-family: var(--font-mono);
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,229,255,0.05);
    }

    /* ── Message bubbles ───────────────────────────────── */
    .msg {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.3s ease both;
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .msg.user .msg-avatar {
      background: linear-gradient(135deg, var(--accent2), #a78bfa);
    }

    .msg.bhavi .msg-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 16px var(--glow);
    }

    .msg-body { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }

    .msg.user .msg-body { align-items: flex-end; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 13.5px;
    }

    .msg.user .msg-bubble {
      background: linear-gradient(135deg, rgba(123,97,255,0.25), rgba(0,229,255,0.15));
      border: 1px solid rgba(123,97,255,0.3);
      border-bottom-right-radius: 4px;
    }

    .msg.bhavi .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-meta {
      font-size: 10px;
      color: var(--muted);
      padding: 0 4px;
    }

    /* ── BhaVi answer blocks ───────────────────────────── */
    .answer-block {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-card {
      background: rgba(0,229,255,0.03);
      border: 1px solid rgba(0,229,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12.5px;
    }

    .result-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .result-rank {
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .result-sim {
      font-size: 11px;
      color: var(--muted);
    }

    .result-sim span {
      color: var(--accent);
      font-weight: 600;
    }

    .result-text {
      color: var(--text);
      line-height: 1.65;
    }

    .result-source {
      margin-top: 6px;
      font-size: 10px;
      color: var(--muted);
    }

    .math-tag {
      display: inline-block;
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.2);
      color: var(--accent3);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 9px;
      margin-right: 6px;
      vertical-align: middle;
    }

    .no-knowledge {
      color: var(--muted);
      font-style: italic;
      font-size: 12.5px;
      padding: 8px 0;
    }

    /* ── Metrics bar ───────────────────────────────────── */
    .metrics {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .metric {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--muted);
    }

    .metric-bar {
      width: 40px;
      height: 3px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .metric-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.5s ease;
    }

    /* ── Loading ───────────────────────────────────────── */
    .thinking {
      display: flex;
      gap: 5px;
      padding: 14px 16px;
    }

    .thinking span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }

    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Stats panel ───────────────────────────────────── */
    .stats-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      font-size: 12px;
    }

    .stats-panel h3 {
      font-family: var(--font-head);
      font-size: 13px;
      margin-bottom: 12px;
      color: var(--accent);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat-item {
      background: rgba(0,229,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat-value {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* ── Input area ────────────────────────────────────── */
    .input-area {
      padding: 16px 0 24px;
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: rgba(0,229,255,0.4);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.06);
    }

    #userInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13.5px;
      resize: none;
      min-height: 22px;
      max-height: 120px;
      line-height: 1.5;
      padding: 2px 0;
    }

    #userInput::placeholder { color: var(--muted); }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 15px;
    }

    .btn-icon:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(123,97,255,0.08);
    }

    .btn-send {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      border: none;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 15px;
      box-shadow: 0 0 16px var(--glow);
    }

    .btn-send:hover { transform: scale(1.05); box-shadow: 0 0 24px var(--glow); }
    .btn-send:active { transform: scale(0.97); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .input-hint {
      font-size: 10px;
      color: var(--muted);
      margin-top: 7px;
      padding: 0 4px;
    }

    /* ── Loading overlay ───────────────────────────────── */
    .load-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      transition: opacity 0.5s;
    }

    .load-overlay.hidden { opacity: 0; pointer-events: none; }

    .load-orb {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid rgba(0,229,255,0.3);
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .load-text {
      font-family: var(--font-head);
      font-size: 15px;
      color: var(--muted);
    }

    .load-sub {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
    }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 600px) {
      .welcome h2 { font-size: 22px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div class="load-overlay" id="loadOverlay">
  <div class="load-orb"></div>
  <div class="load-text">Initializing BhaVi</div>
  <div class="load-sub" id="loadStatus">Loading neural field knowledge...</div>
</div>

<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🧠</div>
      <div class="logo-text">Bha<span>Vi</span>.ai</div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span id="statusText">Loading...</span>
    </div>
  </header>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-orb">🧠</div>
      <div>
        <h2>Neural Field <em>Intelligence</em></h2>
        <p style="margin-top:10px">
          BhaVi thinks in continuous fields, not tokens.<br>
          Ask anything from its learned knowledge.
        </p>
      </div>
      <div class="welcome-chips" id="suggestionChips"></div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="userInput"
        placeholder="Ask BhaVi anything..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <div class="input-actions">
        <button class="btn-icon" onclick="showStats()" title="Knowledge stats">📊</button>
        <button class="btn-send" id="sendBtn" onclick="ask()" title="Send">
          ↑
        </button>
      </div>
    </div>
    <div class="input-hint">
      Enter to send · Shift+Enter for new line ·
      <span id="knowledgeCount">0</span> passages loaded
    </div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────
let knowledge = [];      // [{text, encoding, source, math, importance}]
let isReady   = false;
let isBusy    = false;

// ── Load knowledge on startup ─────────────────────────────────────
async function init() {
  setLoadStatus("Loading neural field knowledge...");

  try {
    const res  = await fetch("docs/bhavi_knowledge.json");
    const data = await res.json();
    knowledge  = data.passages || [];

    setLoadStatus(`Loaded ${knowledge.length} knowledge passages`);
    await sleep(600);

    document.getElementById("statusText").textContent =
      `${knowledge.length} passages · Neural Field Active`;
    document.getElementById("knowledgeCount").textContent = knowledge.length;

    // Build suggestion chips from first few passages
    buildSuggestions();

    isReady = true;
    hideLoader();

  } catch (e) {
    // No knowledge file yet — still usable
    setLoadStatus("No knowledge loaded — feed BhaVi first");
    document.getElementById("statusText").textContent = "No knowledge loaded";
    await sleep(1200);
    isReady = true;
    hideLoader();
  }
}

function buildSuggestions() {
  const chips   = document.getElementById("suggestionChips");
  const samples = knowledge
    .filter(p => p.text && p.text.length > 30)
    .slice(0, 6)
    .map(p => {
      // Extract first sentence as suggestion label
      const first = p.text.trim().split(/[.!?]/)[0].trim();
      return first.length > 60 ? first.slice(0, 57) + "..." : first;
    })
    .filter(Boolean);

  chips.innerHTML = samples
    .map(s => `<div class="chip" onclick="fillInput('${s.replace(/'/g,"\\'")}')">
                 ${s}
               </div>`)
    .join("");
}

// ── Cosine similarity ─────────────────────────────────────────────
function cosineSim(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    na  += a[i] * a[i];
    nb  += b[i] * b[i];
  }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-8);
}

// ── Simple text → encoding (character-level frequency vector) ─────
// This is a lightweight JS version of field encoding
// Captures character patterns and simple statistics
function encodeQuery(text) {
  const dim = 256;
  const vec = new Float32Array(dim);
  const t   = text.toLowerCase();

  // Character frequency features
  for (let i = 0; i < t.length; i++) {
    const c = t.charCodeAt(i) % dim;
    vec[c] += 1.0 / t.length;
  }

  // Bigram features (character pairs)
  for (let i = 0; i < t.length - 1; i++) {
    const bi = (t.charCodeAt(i) * 31 + t.charCodeAt(i+1)) % dim;
    vec[bi] += 0.5 / t.length;
  }

  // Word-level features
  const words = t.split(/\s+/);
  for (const w of words) {
    let h = 0;
    for (let j = 0; j < w.length; j++) h = (h * 31 + w.charCodeAt(j)) & 0xffff;
    vec[h % dim] += 1.5 / words.length;
  }

  // L2 normalize
  let norm = 0;
  for (let i = 0; i < dim; i++) norm += vec[i] * vec[i];
  norm = Math.sqrt(norm) + 1e-8;
  for (let i = 0; i < dim; i++) vec[i] /= norm;

  return vec;
}

// ── Search knowledge ──────────────────────────────────────────────
function searchKnowledge(query, topK = 3) {
  if (knowledge.length === 0) return [];

  const qEnc = encodeQuery(query);

  const scored = knowledge
    .filter(p => p.encoding && p.encoding.length > 0)
    .map(p => ({
      ...p,
      sim: cosineSim(qEnc, p.encoding)
    }))
    .sort((a, b) => b.sim - a.sim)
    .slice(0, topK);

  return scored;
}

// ── Ask BhaVi ─────────────────────────────────────────────────────
function ask() {
  const input = document.getElementById("userInput");
  const q     = input.value.trim();
  if (!q || isBusy || !isReady) return;

  // Hide welcome
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();

  isBusy = true;
  input.value = "";
  autoResize(input);
  document.getElementById("sendBtn").disabled = true;

  // User bubble
  addMessage("user", q);

  // Thinking indicator
  const thinkId = addThinking();

  setTimeout(() => {
    removeThinking(thinkId);
    const results = searchKnowledge(q, 3);
    const html    = buildAnswer(q, results);
    addMessage("bhavi", html, true);
    isBusy = false;
    document.getElementById("sendBtn").disabled = false;
  }, 600 + Math.random() * 400);
}

// ── Build answer HTML ─────────────────────────────────────────────
function buildAnswer(query, results) {
  if (knowledge.length === 0) {
    return `<div class="no-knowledge">
      I have no knowledge yet.<br>
      Run <code>python3 learn.py</code> then <code>python3 export_knowledge.py</code>
      and push to GitHub.
    </div>`;
  }

  if (results.length === 0 || results[0].sim < 0.05) {
    return `<div class="no-knowledge">
      I don't have strong knowledge about this topic yet.<br>
      Feed me more content with <code>python3 learn.py</code>
    </div>`;
  }

  const cards = results.map((r, i) => {
    const pct     = Math.round(r.sim * 100);
    const mathTag = r.math ? `<span class="math-tag">∑ math</span>` : "";
    const src     = r.source ? `<div class="result-source">
                      Source: ${r.source}
                    </div>` : "";
    return `
      <div class="result-card">
        <div class="result-card-header">
          <span class="result-rank">Match ${i + 1}</span>
          <span class="result-sim">Relevance <span>${pct}%</span></span>
        </div>
        <div class="result-text">${mathTag}${escHtml(r.text.trim())}</div>
        ${src}
      </div>`;
  }).join("");

  const best = results[0];
  const conf = Math.min(best.sim * 1.4, 1.0);
  const unc  = 1 - conf;

  const metrics = `
    <div class="metrics">
      <div class="metric">
        <div class="metric-bar"><div class="metric-fill" style="width:${conf*100}%"></div></div>
        Confidence ${Math.round(conf*100)}%
      </div>
      <div class="metric">
        <div class="metric-bar"><div class="metric-fill" style="width:${unc*100}%;background:var(--accent3)"></div></div>
        Uncertainty ${Math.round(unc*100)}%
      </div>
    </div>`;

  return `<div class="answer-block">${cards}${metrics}</div>`;
}

// ── Show stats ────────────────────────────────────────────────────
function showStats() {
  const mathCount = knowledge.filter(p => p.math).length;
  const sources   = [...new Set(knowledge.map(p => p.source).filter(Boolean))];

  const html = `
    <div class="stats-panel">
      <h3>📊 BhaVi Knowledge Base</h3>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value">${knowledge.length}</div>
          <div class="stat-label">Total Passages</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${mathCount}</div>
          <div class="stat-label">Math Content</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${sources.length}</div>
          <div class="stat-label">Sources</div>
        </div>
      </div>
      ${sources.length > 0 ? `
        <div style="margin-top:12px; font-size:11px; color:var(--muted)">
          Sources: ${sources.map(s => `<span style="color:var(--text)">${s}</span>`).join(", ")}
        </div>` : ""}
    </div>`;

  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();
  addMessage("bhavi", html, true);
}

// ── DOM helpers ───────────────────────────────────────────────────
function addMessage(role, content, isHtml = false) {
  const msgs    = document.getElementById("messages");
  const isUser  = role === "user";
  const avatar  = isUser ? "👤" : "🧠";
  const time    = new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});

  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      <div class="msg-bubble">
        ${isHtml ? content : escHtml(content)}
      </div>
      <div class="msg-meta">${time}</div>
    </div>`;

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addThinking() {
  const msgs = document.getElementById("messages");
  const id   = "think_" + Date.now();
  const div  = document.createElement("div");
  div.className = "msg bhavi";
  div.id = id;
  div.innerHTML = `
    <div class="msg-avatar">🧠</div>
    <div class="msg-body">
      <div class="msg-bubble">
        <div class="thinking">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}

function removeThinking(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function escHtml(t) {
  return t.replace(/&/g,"&amp;")
          .replace(/</g,"&lt;")
          .replace(/>/g,"&gt;")
          .replace(/\n/g,"<br>");
}

function fillInput(text) {
  document.getElementById("userInput").value = text;
  document.getElementById("userInput").focus();
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    ask();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function setLoadStatus(msg) {
  document.getElementById("loadStatus").textContent = msg;
}

function hideLoader() {
  document.getElementById("loadOverlay").classList.add("hidden");
  setTimeout(() => {
    document.getElementById("loadOverlay").style.display = "none";
  }, 600);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Start ─────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
